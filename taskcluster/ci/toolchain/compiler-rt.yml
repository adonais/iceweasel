    treeherder:
        symbol: TL(wasi-crt-16)
    worker-type: b-linux-xlarge-gcp
    run:
        script: build-compiler-rt-wasi.sh
        toolchain-artifact: public/build/compiler-rt-wasm32-wasi.tar.zst
