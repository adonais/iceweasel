        - windows-7-tests

windows10-32-shippable-qr/opt:
    build-platform: win32-shippable/opt
    build-signing-label: build-signing-win32-shippable/opt
    test-sets:
        - windows-talos

windows10-32-qr/opt:
    build-platform: win32/opt
    test-sets:
        - windows-talos

# win11-32
